<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Form</title>

    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(to right, #74ebd5, #acb6e5);
        margin: 0;
        padding: 0;
      }

      h1 {
        text-align: center;
        color: #333;
        margin-top: 20px;
      }

      .container {
        width: 420px;
        margin: 30px auto;
        padding: 25px;
        background: white;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        animation: fadeIn 0.6s ease-in-out;
      }

      h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #444;
      }

      label {
        font-weight: 600;
        display: block;
        margin-bottom: 5px;
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        border: 1px solid #ddd;
        border-radius: 8px;
        transition: 0.3s;
        font-size: 14px;
      }

      input:focus,
      select:focus,
      textarea:focus {
        border-color: #4caf50;
        box-shadow: 0 0 5px rgba(76, 175, 80, 0.5);
        outline: none;
      }
      .checkbox-group {
        margin-bottom: 15px;
      }

      .checkbox-group label {
        font-weight: normal;
        margin-right: 10px;
      }

      .checkbox-group input {
        margin-right: 5px;
      }
      #terms {
        width: auto;
        margin-right: 5px;
      }
      button {
        width: 100%;
        padding: 12px;
        background: linear-gradient(to right, #4caf50, #2e7d32);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        background: linear-gradient(to right, #2e7d32, #1b5e20);
        transform: scale(1.02);
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>

  <body>
    <h1>Day-3 Assignment Registration Form</h1>

    <div class="container">
      <h2>Registration Form</h2>
      <form action="#" method="POST">
        <label for="name">Full Name</label>
        <input
          type="text"
          id="name"
          name="name"
          placeholder="Enter your name"
          required
          pattern="[A-Za-z ]{3,}"
          title="Name should be at least 3 letters"
        />
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Enter your email"
          required
        />
        <label for="phone">Phone</label>
        <input
          type="tel"
          id="phone"
          name="phone_number"
          placeholder="10 digit number"
          pattern="[0-9]{10}"
          required
          title="Enter 10 digit phone number"
        />
        <label for="dob">Date of Birth</label>
        <input type="date" id="dob" name="dob" required />

        <label for="file">Upload Profile</label>
        <input type="file" id="file" name="file" />
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          pattern="[A-Za-z0-9@#$%^&+=]{6,12}"
          required
          placeholder="Min 6 characters AND Max 12 characters"
        <label>Skills</label>
        <div class="checkbox-group">
          <input type="checkbox" id="html" name="skills" value="html" />
          <label for="html">HTML</label>

          <input type="checkbox" id="css" name="skills" value="css" />
          <label for="css">CSS</label>

          <input type="checkbox" id="js" name="skills" value="js" />
          <label for="js">JavaScript</label>
        </div>
        <label for="country">Country</label>
        <select id="country" name="country" required>
          <option value="">Select Country</option>
          <option>India</option>
          <option>USA</option>
        </select>
        <label for="message">Message</label>
        <textarea
          id="message"
          name="message"
          rows="3"
          placeholder="Your message"
        ></textarea>
        <input type="checkbox" id="terms" required />
        <label for="terms">I agree to Terms & Conditions</label>
        <button type="submit">Register</button>
      </form>
    </div>
  </body>
</html>
